<!DOCTYPE html>
<!--
    diatom/src/ui/home-base.html  — v0.12.0  [F-09]

    Home Base — 快速拨号视觉导航中心
    Replaces about:blank new-tab with a privacy-respecting Frequency Map.

    Data sources (all local, zero external requests):
      1. Top 8 domains by visit_count from history table
      2. Pinned shortcuts from bookmarks WHERE tags LIKE '%pinned%'
      3. Last 3 Museum bundles (recently frozen pages)
      4. RSS unread count
      5. SLM status

    Lab ID: home_base
    Intercepted: about:diatom → serve this file from resources
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diatom</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080c12;
    --surface:   #0f1621;
    --border:    rgba(96,165,250,.12);
    --text:      #e2e8f0;
    --muted:     #64748b;
    --accent:    #60a5fa;
    --accent-2:  #818cf8;
    --radius:    10px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: grid;
    place-items: start center;
    padding: 48px 24px 32px;
    gap: 0;
    overflow-y: auto;
  }

  .container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 32px; }

  /* ── Search bar ── */
  .search-bar {
    display: flex; align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 10px 20px; gap: 10px;
    transition: border-color .15s;
  }
  .search-bar:focus-within { border-color: rgba(96,165,250,.4); }
  .search-bar input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font: inherit; font-size: 15px;
  }
  .search-bar input::placeholder { color: var(--muted); }
  .search-icon { color: var(--muted); font-size: 16px; }

  /* ── Section headers ── */
  .section-title {
    font-size: 11px; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 10px;
  }

  /* ── Grid sections ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* ── Site cards (pinned + top visited) ── */
  .site-card {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 12px; gap: 8px;
    cursor: pointer; text-decoration: none; color: var(--text);
    transition: border-color .15s, transform .1s;
    min-height: 88px; text-align: center;
  }
  .site-card:hover { border-color: rgba(96,165,250,.3); transform: translateY(-1px); }
  .site-card .favicon {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--bg); object-fit: contain;
  }
  .site-card .favicon-fallback {
    width: 28px; height: 28px; border-radius: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
  }
  .site-card .label { font-size: 11px; color: var(--muted); line-height: 1.3; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .site-card .pinned-badge { font-size: 9px; color: var(--accent); letter-spacing: .04em; }

  /* ── Museum recent saves ── */
  .museum-list { display: flex; flex-direction: column; gap: 8px; }
  .museum-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px;
    cursor: pointer; text-decoration: none; color: var(--text);
    transition: border-color .15s;
  }
  .museum-item:hover { border-color: rgba(96,165,250,.3); }
  .museum-icon { font-size: 16px; flex-shrink: 0; }
  .museum-title { font-size: 13px; font-weight: 500; }
  .museum-meta  { font-size: 11px; color: var(--muted); margin-top: 1px; }

  /* ── Status bar ── */
  .status-bar {
    display: flex; align-items: center; gap: 20px;
    font-size: 11px; color: var(--muted);
    padding: 8px 0; border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .status-badge {
    display: flex; align-items: center; gap: 5px;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }
  .status-dot.offline { background: var(--muted); }
  .status-dot.warn    { background: #f59e0b; }

  .empty-msg { color: var(--muted); font-size: 12px; padding: 8px 0; }
</style>
</head>
<body>
<div class="container">

  <!-- Search bar -->
  <div class="search-bar">
    <span class="search-icon">⌕</span>
    <input id="search" type="text" placeholder="Search or enter a URL…" autocomplete="off" autofocus>
  </div>

  <!-- Pinned shortcuts -->
  <section id="pinned-section">
    <div class="section-title">Pinned</div>
    <div class="grid" id="pinned-grid"><div class="empty-msg">No pinned shortcuts yet</div></div>
  </section>

  <!-- Top visited -->
  <section id="top-section">
    <div class="section-title">Frequently Visited</div>
    <div class="grid" id="top-grid"><div class="empty-msg">No history yet</div></div>
  </section>

  <!-- Recent Museum saves -->
  <section id="museum-section">
    <div class="section-title">Recent Museum Saves</div>
    <div class="museum-list" id="museum-list"><div class="empty-msg">No frozen pages yet</div></div>
  </section>

  <!-- Status bar -->
  <div class="status-bar" id="status-bar">
    <span class="status-badge"><span class="status-dot offline" id="slm-dot"></span><span id="slm-label">SLM offline</span></span>
    <span class="status-badge" id="rss-badge">RSS —</span>
    <span style="margin-left:auto">Diatom v0.12.0 · Privacy-first browser</span>
  </div>
</div>

<script type="module">
import { invoke } from '../browser/ipc.js';
import { domainOf, escHtml, timeAgo } from '../browser/utils.js';

// ── Data loading ──────────────────────────────────────────────────────────────

async function loadData() {
    try {
        const data = await invoke('cmd_home_base_data');
        renderPinned(data.pinned ?? []);
        renderTop(data.top_domains ?? []);
        renderMuseum(data.recent_museum ?? []);
        renderStatus(data.slm_status, data.rss_unread ?? 0);
    } catch (err) {
        console.warn('[home-base] data load failed:', err);
    }
}

// ── Renderers ─────────────────────────────────────────────────────────────────

function renderPinned(items) {
    const grid = document.getElementById('pinned-grid');
    if (!items.length) return;
    grid.innerHTML = items.map(item => siteCard(item.url, item.title, true)).join('');
    grid.querySelectorAll('[data-nav]').forEach(el =>
        el.addEventListener('click', () => navigate(el.dataset.nav)));
}

function renderTop(items) {
    const grid = document.getElementById('top-grid');
    if (!items.length) return;
    grid.innerHTML = items.slice(0, 8).map(item => siteCard(item.url, item.domain)).join('');
    grid.querySelectorAll('[data-nav]').forEach(el =>
        el.addEventListener('click', () => navigate(el.dataset.nav)));
}

function renderMuseum(items) {
    const list = document.getElementById('museum-list');
    if (!items.length) return;
    list.innerHTML = items.slice(0, 3).map(item => `
        <div class="museum-item" data-bundle="${escHtml(item.id)}">
            <span class="museum-icon">🧊</span>
            <div>
                <div class="museum-title">${escHtml((item.title || item.url).slice(0, 70))}</div>
                <div class="museum-meta">${escHtml(domainOf(item.url))} · ${timeAgo(item.frozen_at * 1000)}</div>
            </div>
        </div>
    `).join('');
    list.querySelectorAll('[data-bundle]').forEach(el =>
        el.addEventListener('click', () => invoke('cmd_museum_thaw', { id: el.dataset.bundle })));
}

function renderStatus(slmStatus, rssUnread) {
    const dot   = document.getElementById('slm-dot');
    const label = document.getElementById('slm-label');
    const rss   = document.getElementById('rss-badge');

    if (slmStatus?.server_listening) {
        dot.className = 'status-dot';
        label.textContent = `SLM · ${slmStatus.active_model ?? 'ready'}`;
    }

    if (rssUnread > 0) {
        rss.innerHTML = `<span class="status-dot warn"></span> ${rssUnread} unread`;
    } else {
        rss.textContent = 'RSS — no unread';
    }
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function siteCard(url, label, pinned = false) {
    const domain = domainOf(url);
    const letter = (label || domain)[0]?.toUpperCase() ?? '?';
    return `
        <div class="site-card" data-nav="${escHtml(url)}">
            <div class="favicon-fallback">${escHtml(letter)}</div>
            <div class="label" title="${escHtml(label || domain)}">${escHtml((label || domain).slice(0, 18))}</div>
            ${pinned ? '<div class="pinned-badge">PINNED</div>' : ''}
        </div>
    `;
}

function navigate(url) {
    invoke('cmd_setting_set', { key: '__navigate_to__', value: url }).catch(() => {});
    window.location.href = url;
}

// ── Search ────────────────────────────────────────────────────────────────────

document.getElementById('search').addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const val = e.target.value.trim();
    if (!val) return;
    navigate(val.includes('.') && !val.includes(' ') ? val : `https://search.brave.com/search?q=${encodeURIComponent(val)}`);
});

// ── Boot ──────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
